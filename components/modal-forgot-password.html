<dialog id="modal_forgot" class="modal" tabindex="-1">
    <div class="modal-box max-w-sm p-6">
        <h3 class="font-black text-[11px] mb-2 uppercase text-slate-400 border-b pb-2">Récupération</h3>
        <p class="text-xs text-slate-500 mb-6 leading-relaxed">Saisissez votre email. Nous vous enverrons un lien (token) pour réinitialiser votre accès.</p>
        
        <div class="form-control mb-6">
            <label class="sr-only" for="forgot-email">Adresse e-mail</label>
            <input type="email" id="forgot-email" name="email" autocomplete="email" placeholder="votre@email.com" class="input input-bordered w-full font-bold h-11" required />
        </div>

        <div class="modal-action flex justify-end gap-2">
            <button type="button" id="btn-forgot-cancel" class="btn btn-ghost btn-xs font-bold">ANNULER</button>
            <button type="button" id="btn-send-token" class="btn btn-primary btn-xs px-4 font-bold">ENVOYER L'URL</button>
        </div>
    </div>
</dialog>
