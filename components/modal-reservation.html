<dialog id="modal_reservation" class="modal">
    <div class="modal-box reservation-route-box p-4 w-[96%] max-w-md max-h-[90dvh] flex flex-col border-0 shadow-none">
        <div id="wrap-reservation-body" class="space-y-4 overflow-y-auto flex-1 min-w-0 py-1">
            <div id="wrap-reservation-info" class="hidden" aria-hidden="true"></div>
            <div id="wrap-reservation-readonly" class="hidden" aria-hidden="true"></div>
            <div id="wrap-reservation-editor" class="space-y-4 reservation-editor-simple">
                <div id="wrap-reservation-owner-target" class="hidden form-control">
                    <label class="label py-0" for="reservation-slot-owner-email">
                        <span class="label-text font-bold text-[11px] uppercase text-slate-500">Créneau pour</span>
                    </label>
                    <select id="reservation-slot-owner-email" class="select select-sm w-full"></select>
                </div>

                <label class="form-control block" for="event-date-start">
                    <span class="label-text font-bold text-[11px] uppercase text-slate-500 py-0">Jour</span>
                    <input type="date" id="event-date-start" class="input input-bordered input-sm w-full font-mono text-sm mt-0.5 bg-white dark:bg-slate-900" />
                </label>

                <div class="form-control">
                    <span class="label-text font-bold text-[11px] uppercase text-slate-500 block mb-1">Horaires</span>
                    <div class="flex flex-wrap items-center gap-2">
                        <select id="event-start" aria-label="Heure de début" class="select select-sm w-[6.5rem] font-mono bg-white dark:bg-slate-900"></select>
                        <span class="text-slate-500 text-sm">à</span>
                        <select id="event-end" aria-label="Heure de fin" class="select select-sm w-[6.5rem] font-mono bg-white dark:bg-slate-900"></select>
                    </div>
                    <input type="hidden" id="event-date-display" />
                </div>

                <div id="wrap-reservation-motif" class="form-control">
                    <label class="label py-0" for="event-motif-select"><span class="label-text font-bold text-[11px] uppercase text-slate-500">Motif</span></label>
                    <p id="event-motif-hint-fermeture" class="hidden text-[10px] text-slate-500 -mt-1 mb-1">Le motif <strong>Fermeture</strong> est réservé aux administrateurs.</p>
                    <select id="event-motif-select" class="select select-sm w-full bg-white dark:bg-slate-900"></select>
                </div>

                <div id="wrap-reservation-title" class="form-control">
                    <label class="label py-0" for="event-title-input"><span class="label-text font-bold text-[11px] uppercase text-slate-500">Titre</span></label>
                    <input id="event-title-input" type="text" maxlength="120" class="input input-sm w-full bg-white dark:bg-slate-900" />
                </div>

                <div id="event-recurring-wrap" class="hidden" aria-hidden="true"></div>
                <div id="wrap-reservation-inscrits" class="hidden form-control" aria-hidden="true">
                    <span class="label-text font-bold text-[11px] uppercase text-slate-500 py-0">Élèves inscrits</span>
                    <p id="reservation-inscrits-summary" class="text-[11px] text-slate-700 dark:text-slate-200 mt-1 mb-2 leading-snug">Aucun élève (optionnel)</p>
                    <button type="button" id="event-inscrits-users-toggle" class="btn btn-outline btn-sm font-bold text-[11px] w-full sm:w-auto">Gérer les inscrits</button>
                    <select id="event-inscrits-select" multiple class="hidden"></select>
                </div>
                <p id="event-editor-owner" class="hidden" aria-hidden="true"></p>

                <div id="reservation-delete-wrap" class="hidden pt-3 mt-1 border-t border-slate-200 dark:border-slate-600">
                    <button type="button" id="btn-delete" class="btn btn-error btn-outline btn-sm font-bold text-[11px] w-full sm:w-auto">Supprimer</button>
                </div>

                <div id="reservation-form-actions" class="hidden flex flex-wrap justify-end gap-2 pt-3 mt-1 border-t border-slate-200 dark:border-slate-600" aria-hidden="true">
                    <button type="button" id="btn-reservation-cancel" class="btn btn-ghost btn-sm font-bold text-[11px]">Annuler</button>
                    <button type="button" id="btn-reservation-save" class="btn btn-primary btn-sm font-bold text-[11px]">Sauver</button>
                </div>
            </div>
        </div>

        <div class="reservation-route-actions hidden" aria-hidden="true">
            <button type="button" id="btn-save" class="hidden" aria-hidden="true">Enregistrer</button>
        </div>
    </div>
</dialog>
