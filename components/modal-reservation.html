<dialog id="modal_reservation" class="modal">
    <div class="modal-box p-5 w-[94%] max-w-[380px] max-h-[90dvh] rounded-2xl border border-slate-200 shadow-2xl flex flex-col">
        <h3 class="font-black text-xs mb-3 uppercase text-slate-500 border-b pb-2 tracking-widest shrink-0">Détails de l'occupation</h3>
        
        <div id="wrap-reservation-body" class="space-y-4 overflow-y-auto flex-1 min-h-0 py-1">
            <div id="wrap-reservation-readonly" class="hidden space-y-3 rounded-xl border border-slate-200 bg-slate-50/80 p-4">
                <p id="event-readonly-owner" class="text-[13px] font-bold text-slate-800 leading-snug"></p>
                <p id="event-readonly-when" class="text-[13px] font-bold text-slate-700 leading-snug"></p>
                <div>
                    <p class="text-[11px] font-bold uppercase text-slate-500 tracking-wide">Motif / cours</p>
                    <p id="event-readonly-description" class="text-[15px] font-black text-slate-900 leading-snug mt-0.5"></p>
                </div>
            </div>
            <div id="wrap-reservation-editor" class="space-y-4">
            <p id="event-editor-owner" class="text-[13px] font-bold text-slate-800 leading-snug rounded-lg bg-slate-50 px-3 py-2 border border-slate-200"></p>

            <div id="wrap-datetime-simple" class="bg-slate-100/80 p-4 rounded-xl border border-slate-200">
                <div class="flex flex-wrap items-center gap-x-2 gap-y-2 text-sm text-slate-800 font-bold">
                    <span class="shrink-0">Le</span>
                    <input type="date" id="event-date-start" aria-label="Jour" class="input input-sm w-auto min-w-[9.25rem] min-h-10 font-black text-sm bg-white border border-slate-200 rounded-lg shadow-sm focus:border-slate-300 focus:outline-none focus:ring-0" />
                    <span class="shrink-0">de</span>
                    <select id="event-start" aria-label="Heure de début" class="select select-sm w-[6.5rem] shrink-0 min-h-10 font-black text-sm bg-white border border-slate-200 rounded-lg shadow-sm focus:border-slate-300 focus:outline-none focus:ring-0"></select>
                    <span class="shrink-0">à</span>
                    <select id="event-end" aria-label="Heure de fin" class="select select-sm w-[6.5rem] shrink-0 min-h-10 font-black text-sm bg-white border border-slate-200 rounded-lg shadow-sm focus:border-slate-300 focus:outline-none focus:ring-0"></select>
                </div>
            </div>

            <div id="event-recurring-wrap" class="form-control hidden rounded-xl border border-slate-200 bg-slate-50/80 p-3">
                <label class="label cursor-pointer justify-start gap-2 py-0 min-h-0">
                    <input type="checkbox" id="event-recurring" class="checkbox checkbox-primary checkbox-sm shrink-0" />
                    <span class="label-text font-bold text-[11px] uppercase text-slate-600 leading-snug text-left">
                        Réservation sur plusieurs jours<br />
                        <span class="font-normal normal-case text-[10px] text-slate-500">Même horaire chaque jour retenu : toute la période en continu, ou seulement certains jours de la semaine.</span>
                    </span>
                </label>
                <div id="event-recurring-body" class="hidden mt-3 space-y-3">
                    <div class="rounded-lg border border-slate-200/90 bg-white/70 p-3 space-y-3">
                        <div class="flex flex-wrap items-center gap-x-2 gap-y-2 text-sm text-slate-800 font-bold">
                            <span class="shrink-0">Du</span>
                            <input type="date" id="event-recur-period-start" aria-label="Début de période" class="input input-sm w-auto min-w-[9.25rem] min-h-10 font-black text-sm bg-white border border-slate-200 rounded-lg shadow-sm focus:border-slate-300 focus:outline-none focus:ring-0" />
                            <span class="shrink-0">au</span>
                            <input type="date" id="event-recur-period-end" aria-label="Fin de période" class="input input-sm w-auto min-w-[9.25rem] min-h-10 font-black text-sm bg-white border border-slate-200 rounded-lg shadow-sm focus:border-slate-300 focus:outline-none focus:ring-0" />
                        </div>
                        <div class="flex flex-wrap items-center gap-x-2 gap-y-2 text-sm text-slate-800 font-bold">
                            <span class="shrink-0">De</span>
                            <select id="event-recur-start" aria-label="Heure de début (récurrence)" class="select select-sm w-[6.5rem] shrink-0 min-h-10 font-black text-sm bg-white border border-slate-200 rounded-lg shadow-sm focus:border-slate-300 focus:outline-none focus:ring-0"></select>
                            <span class="shrink-0">à</span>
                            <select id="event-recur-end" aria-label="Heure de fin (récurrence)" class="select select-sm w-[6.5rem] shrink-0 min-h-10 font-black text-sm bg-white border border-slate-200 rounded-lg shadow-sm focus:border-slate-300 focus:outline-none focus:ring-0"></select>
                        </div>
                    </div>
                <div id="event-recurring-options" class="space-y-2">
                    <label class="flex items-start gap-2 cursor-pointer">
                        <input type="radio" name="recur-mode" id="recur-mode-all" value="all" class="radio radio-primary radio-sm mt-0.5 shrink-0" checked />
                        <span class="text-xs font-bold text-slate-600 leading-snug">Tous les jours de la période</span>
                    </label>
                    <label class="flex items-start gap-2 cursor-pointer">
                        <input type="radio" name="recur-mode" id="recur-mode-days" value="days" class="radio radio-primary radio-sm mt-0.5 shrink-0" />
                        <span class="text-xs font-bold text-slate-600 leading-snug">Choisir les jours de la semaine</span>
                    </label>
                    <div id="recur-dow-grid" class="hidden flex flex-wrap gap-2 pl-1 pt-1">
                        <label class="label cursor-pointer gap-1.5 py-0"><input type="checkbox" id="recur-dow-1" class="checkbox checkbox-sm checkbox-primary" checked /><span class="label-text text-[11px] font-bold">Lun</span></label>
                        <label class="label cursor-pointer gap-1.5 py-0"><input type="checkbox" id="recur-dow-2" class="checkbox checkbox-sm checkbox-primary" checked /><span class="label-text text-[11px] font-bold">Mar</span></label>
                        <label class="label cursor-pointer gap-1.5 py-0"><input type="checkbox" id="recur-dow-3" class="checkbox checkbox-sm checkbox-primary" checked /><span class="label-text text-[11px] font-bold">Mer</span></label>
                        <label class="label cursor-pointer gap-1.5 py-0"><input type="checkbox" id="recur-dow-4" class="checkbox checkbox-sm checkbox-primary" checked /><span class="label-text text-[11px] font-bold">Jeu</span></label>
                        <label class="label cursor-pointer gap-1.5 py-0"><input type="checkbox" id="recur-dow-5" class="checkbox checkbox-sm checkbox-primary" checked /><span class="label-text text-[11px] font-bold">Ven</span></label>
                        <label class="label cursor-pointer gap-1.5 py-0"><input type="checkbox" id="recur-dow-6" class="checkbox checkbox-sm checkbox-primary" /><span class="label-text text-[11px] font-bold">Sam</span></label>
                        <label class="label cursor-pointer gap-1.5 py-0"><input type="checkbox" id="recur-dow-0" class="checkbox checkbox-sm checkbox-primary" /><span class="label-text text-[11px] font-bold">Dim</span></label>
                    </div>
                </div>
                </div>
            </div>

            <div class="form-control">
                <label class="label py-0"><span class="label-text font-bold text-[11px] uppercase text-slate-500">Motif / cours</span></label>
                <select id="event-title-select" class="select select-sm w-full font-bold text-sm h-11 bg-slate-50 border border-slate-200 rounded-lg shadow-sm focus:border-slate-300 focus:outline-none focus:ring-0"></select>
                <input type="text" id="event-title-custom" placeholder="Saisie libre…" class="input input-sm w-full font-bold text-sm h-11 bg-slate-50 focus:bg-white mt-2 hidden border border-slate-200 rounded-lg shadow-sm focus:border-slate-300 focus:outline-none focus:ring-0" />
            </div>

            <div id="wrap-event-type" class="form-control">
                <label class="label py-0"><span class="label-text font-bold text-[11px] uppercase text-slate-500">Type de créneau</span></label>
                <select id="event-type" class="select select-sm w-full font-bold text-sm h-11 bg-slate-50 border border-slate-200 rounded-lg shadow-sm focus:border-slate-300 focus:outline-none focus:ring-0">
                    <option value="reservation">Réservation standard</option>
                    <option value="cours">Cours</option>
                    <option value="fermeture">Fermeture</option>
                </select>
            </div>
            </div>
        </div>

        <div class="modal-action flex justify-between mt-4 pt-3 border-t border-slate-100 shrink-0 sticky bottom-0 bg-base-100">
            <button type="button" id="btn-delete" class="btn btn-error btn-outline btn-sm font-black text-[11px] px-3">SUPPRIMER</button>
            <div class="flex gap-2">
                <button type="button" class="btn btn-ghost btn-sm font-black text-[11px]" onclick="document.getElementById('modal_reservation').close()">ANNULER</button>
                <button type="button" id="btn-save" class="btn btn-primary btn-sm px-5 font-black text-[11px] shadow-lg shadow-primary/20">VALIDER</button>
            </div>
        </div>
    </div>
</dialog>
