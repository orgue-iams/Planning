<dialog id="modal_profile" class="modal">
    <div class="modal-box p-5 w-[96%] max-w-lg max-h-[90dvh] overflow-y-auto rounded-2xl border border-slate-200 shadow-2xl">
        <dl class="space-y-0 divide-y divide-slate-200 m-0">
            <div class="grid grid-cols-[5.75rem_1fr] gap-x-3 items-center min-h-[2.75rem] py-2.5 first:pt-0">
                <dt class="text-[10px] font-bold uppercase text-slate-500 tracking-wide leading-none">Nom</dt>
                <dd class="m-0 min-w-0">
                    <input type="text" id="profile-display-name-input" class="input input-xs input-bordered w-full min-w-0 text-[11px] h-8" autocomplete="name" />
                </dd>
            </div>
            <div class="grid grid-cols-[5.75rem_1fr] gap-x-3 items-center min-h-[2.75rem] py-2.5">
                <dt class="text-[10px] font-bold uppercase text-slate-500 tracking-wide leading-none">E-mail</dt>
                <dd class="m-0 min-w-0">
                    <input type="email" id="profile-email-input" class="input input-xs input-bordered w-full min-w-0 text-[11px] h-8" autocomplete="email" />
                    <p id="profile-email-hint" class="text-[9px] text-slate-500 mt-1 hidden">Vérifiez votre boîte e-mail si une confirmation est demandée par Supabase.</p>
                </dd>
            </div>
            <div class="grid grid-cols-[5.75rem_1fr] gap-x-3 items-center min-h-[2.75rem] py-2.5">
                <dt class="text-[10px] font-bold uppercase text-slate-500 tracking-wide leading-none">Profil</dt>
                <dd id="profile-role-label" class="m-0 min-w-0 text-sm font-medium leading-snug text-slate-800">—</dd>
            </div>
            <div class="grid grid-cols-[5.75rem_1fr] gap-x-3 items-start min-h-[2.75rem] py-2.5">
                <dt class="text-[10px] font-bold uppercase text-slate-500 tracking-wide leading-none pt-1">Tél.</dt>
                <dd class="m-0 min-w-0">
                    <input
                        type="tel"
                        id="profile-phone-input"
                        class="input input-xs input-bordered w-full text-[11px] h-8"
                        autocomplete="tel"
                        maxlength="40"
                    />
                </dd>
            </div>
            <div class="grid grid-cols-[5.75rem_1fr] gap-x-3 items-start min-h-[2.75rem] py-2.5">
                <dt class="text-[10px] font-bold uppercase text-slate-500 tracking-wide leading-none pt-1">Partage d'informations</dt>
                <dd class="m-0 min-w-0 space-y-2">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" id="profile-share-email" class="checkbox checkbox-primary checkbox-sm" />
                        <span class="text-[10px] text-slate-700">Mon email dans la liste des utilisateurs de l'appli</span>
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" id="profile-share-phone" class="checkbox checkbox-primary checkbox-sm" />
                        <span class="text-[10px] text-slate-700">Mon téléphone dans la liste des utilisateurs de l'appli</span>
                    </label>
                </dd>
            </div>
            <div class="grid grid-cols-[5.75rem_1fr] gap-x-3 items-center min-h-[2.75rem] py-2.5">
                <dt class="text-[10px] font-bold uppercase text-slate-500 tracking-wide leading-none">Mot de passe</dt>
                <dd class="m-0 min-w-0">
                    <div class="flex flex-col gap-1.5">
                        <input type="password" id="profile-pass-new" class="input input-xs input-bordered w-full text-[11px] h-8" placeholder="Nouveau mot de passe" autocomplete="new-password" />
                        <input type="password" id="profile-pass-confirm" class="input input-xs input-bordered w-full text-[11px] h-8" placeholder="Confirmer le mot de passe" autocomplete="new-password" />
                        <p id="profile-pass-hint" class="hidden text-[10px] leading-snug min-h-[1rem]" aria-live="polite"></p>
                        <label class="label cursor-pointer justify-start gap-2 py-0 min-h-0">
                            <input type="checkbox" id="profile-pass-show-plain" class="checkbox checkbox-primary checkbox-sm" />
                            <span class="label-text text-[10px] text-slate-600">Montrer les mots de passe</span>
                        </label>
                    </div>
                </dd>
            </div>
        </dl>

        <div id="profile-section-agendas" class="profile-agendas-section hidden mt-4 pt-4 border-t border-slate-200">
            <div class="flex items-center gap-1.5 mb-2">
                <p class="text-[10px] font-bold uppercase text-slate-600 tracking-wide m-0 flex-1">Agendas</p>
                <button
                    type="button"
                    id="drawer-agenda-help-btn"
                    class="planning-drawer__help-btn"
                    title="Afficher ou masquer l’aide"
                    aria-label="Aide agendas Google"
                    aria-expanded="false"
                    aria-controls="drawer-agenda-help-text"
                >
                    ?
                </button>
            </div>
            <p id="drawer-agenda-help-text" class="planning-drawer__agenda-help hidden mb-2" role="region" aria-label="Aide agendas"></p>
            <div class="planning-drawer__agenda-line">
                <span class="planning-drawer__agenda-line-title">Planning complet</span>
                <button type="button" id="drawer-agenda-main-btn" class="planning-drawer__agenda-copy-btn hidden">Copier l’URL</button>
            </div>
            <div class="planning-drawer__agenda-line">
                <span class="planning-drawer__agenda-line-title">Planning personnel</span>
                <button type="button" id="drawer-agenda-personal-btn" class="planning-drawer__agenda-copy-btn hidden">Copier l’URL</button>
            </div>
            <p id="drawer-agenda-personal-none" class="planning-drawer__hint hidden mt-1">Aucun agenda personnel IAMS associé à ce compte.</p>
        </div>
    </div>
</dialog>
