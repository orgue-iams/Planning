<dialog id="modal_profile_labels" class="modal">
    <div class="modal-box max-w-md w-[94%] max-h-[90dvh] flex flex-col border border-slate-200 rounded-2xl">
        <h3 class="font-black text-sm uppercase tracking-wide text-slate-600 border-b pb-2 shrink-0">Mes réservations type</h3>
        <p class="text-[11px] text-slate-500 mt-2 leading-snug">
            Motif proposé par défaut à l’ouverture de la réservation et pour la création rapide par glissement : Travail, Cours, Fermeture ou Autre.
        </p>
        <div class="form-control mt-3">
            <label class="label py-0" for="profile-favorite"><span class="label-text font-bold text-[11px] uppercase text-slate-500">Motif par défaut</span></label>
            <select id="profile-favorite" class="select select-bordered select-sm w-full font-bold text-sm h-11 bg-slate-50"></select>
        </div>
        <div class="modal-action flex-wrap gap-2 mt-4 shrink-0 border-t border-slate-100 pt-3">
            <button type="button" id="profile-labels-btn-save" class="btn btn-primary btn-sm font-black text-[11px]">Enregistrer</button>
            <button type="button" id="profile-labels-btn-close" class="btn btn-ghost btn-sm font-black text-[11px]">Fermer</button>
        </div>
    </div>
</dialog>
