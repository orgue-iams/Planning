<dialog id="modal_profile_labels" class="modal">
    <div class="modal-box max-w-md w-[94%] max-h-[90dvh] flex flex-col border border-slate-200 rounded-2xl">
        <h3 class="font-black text-sm uppercase tracking-wide text-slate-600 border-b pb-2 shrink-0">Mes réservations type</h3>
        <p class="text-[11px] text-slate-500 mt-2 leading-snug">
            Saisissez <strong>une ligne par titre</strong> que vous utilisez souvent (répétition, cours particulier, etc.). Cochez celui qui doit être proposé <strong>par défaut</strong> pour une nouvelle réservation. Les
            <strong>motifs</strong> (Travail, Cours, Fermeture) se choisissent dans la fenêtre de réservation.
        </p>
        <div class="form-control mt-3 flex-1 min-h-0 flex flex-col gap-2">
            <label class="label py-0" for="profile-title-lines"
                ><span class="label-text font-bold text-[11px] uppercase text-slate-500">Titres (une par ligne)</span></label
            >
            <textarea
                id="profile-title-lines"
                rows="7"
                maxlength="2000"
                class="textarea textarea-bordered w-full text-sm bg-slate-50 leading-snug flex-1 min-h-[8rem]"
                placeholder="Ex.&#10;Répétition Bach&#10;Cours avec M. Dupont"
            ></textarea>
        </div>
        <div id="profile-preferred-wrap" class="mt-3 rounded-xl border border-slate-200 bg-slate-50 px-3 py-2.5 min-h-[3rem]"></div>
        <div class="modal-action flex-wrap gap-2 mt-4 shrink-0 border-t border-slate-100 pt-3">
            <button type="button" id="profile-labels-btn-save" class="btn btn-primary btn-sm font-black text-[11px]">Enregistrer</button>
            <button type="button" id="profile-labels-btn-close" class="btn btn-ghost btn-sm font-black text-[11px]">Fermer</button>
        </div>
    </div>
</dialog>
