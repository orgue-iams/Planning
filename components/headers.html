<header class="app-navbar navbar bg-white fixed top-0 z-50 w-full flex flex-col shadow-sm max-sm:shadow-none max-sm:rounded-b-none">
    <!-- Même largeur max que #app-shell (grille) : alignement bandeau / planning sur grand écran -->
    <div class="app-navbar__inner w-full min-w-0 box-border px-0 sm:px-1 sm:max-w-5xl sm:mx-auto">
    <div
        id="calendar-toolbar"
        class="calendar-toolbar app-navbar__toolbar hidden w-full max-w-full gap-1 min-h-[2.1rem] px-1.5 sm:px-0 py-0.5"
    >
        <div class="calendar-toolbar__left flex items-center gap-0.5 min-w-0 shrink-0">
            <button
                type="button"
                id="btn-app-drawer"
                class="btn btn-ghost btn-square btn-xs sm:btn-sm border border-transparent hover:border-slate-200 max-sm:!h-9 max-sm:!w-9 max-sm:!min-h-0 shrink-0"
                aria-label="Menu principal"
                aria-expanded="false"
                aria-controls="planning-app-drawer"
                title="Menu"
            >
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-700" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
                </svg>
            </button>
            <span class="calendar-toolbar__brand-gap shrink-0" aria-hidden="true"></span>
            <button
                type="button"
                id="btn-org-brand-rules"
                class="calendar-toolbar__brand-btn calendar-toolbar__click-chip flex flex-col items-start min-w-0 leading-tight text-left rounded-xl border border-slate-200/90 bg-white/80 px-2.5 py-1 -mx-1 shadow-sm hover:bg-slate-50 hover:border-slate-300"
                aria-label="Consignes d’utilisation"
                title="Consignes d’utilisation"
            >
                <span class="font-black text-[11px] uppercase text-slate-800 max-sm:text-[10px] max-sm:leading-tight">Orgue</span>
                <span class="text-[10px] uppercase text-slate-500 font-bold tracking-wide max-sm:text-[9px] max-sm:leading-tight max-sm:opacity-90">Gérard Bancells</span>
                <span id="header-build-version" class="text-[7px] sm:text-[8px] font-mono text-slate-400 tabular-nums leading-none mt-0.5 max-w-[10rem] truncate text-left" title="" aria-label="Version de l’application"></span>
            </button>
            <div class="hidden lg:flex calendar-toolbar__nav-cluster items-center gap-0.5 shrink-0 ml-0.5 pl-1 border-l border-slate-200/90">
                <button type="button" id="cal-btn-today" class="cal-tb-pill">Aujourd’hui</button>
                <button type="button" id="cal-btn-prev" class="cal-tb-nav" aria-label="Période précédente">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" /></svg>
                </button>
                <button type="button" id="cal-btn-next" class="cal-tb-nav" aria-label="Période suivante">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" /></svg>
                </button>
            </div>
        </div>

        <div id="cal-toolbar-title" class="calendar-toolbar__title min-w-0 text-center" aria-live="polite"></div>

        <div class="calendar-toolbar__right flex items-center justify-end gap-1 sm:gap-1.5 min-w-0 shrink-0 flex-wrap sm:flex-nowrap">
            <button
                type="button"
                id="btn-admin-clear-week"
                class="hidden btn btn-outline btn-xs font-sans font-semibold normal-case text-[10px] sm:text-[11px] leading-tight text-error border-error/40 bg-white hover:bg-error/5 px-2 sm:px-2 h-8 sm:h-8 max-sm:h-7 max-sm:min-h-7 max-sm:px-1.5 max-sm:text-[9px] shrink-0"
                title="Admin : supprime en base tous les créneaux de la période, et supprime dans Google tous les événements sur la même plage (calendrier principal + secondaires assignés). Indépendant des miroirs en base."
            >
                Vider semaine
            </button>
        </div>
    </div>
    </div>
</header>
