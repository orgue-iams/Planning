<dialog id="modal_calendar_pool" class="modal">
    <div class="modal-box p-5 w-[96%] max-w-4xl max-h-[90dvh] rounded-2xl border border-slate-200 shadow-2xl flex flex-col">
        <div class="flex flex-wrap items-center gap-2 justify-between shrink-0 border-b border-slate-100 pb-2 mb-3">
            <h3 class="font-black text-xs uppercase text-slate-500 tracking-widest m-0">Calendriers des utilisateurs (pool)</h3>
            <button type="button" id="calendar-pool-open-add" class="btn btn-square btn-sm btn-ghost planning-icon-btn border border-slate-200" title="Ajouter" aria-label="Ajouter un calendrier au pool">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-5 h-5" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M12 5v14m-7-7h14"/></svg>
            </button>
        </div>

        <div class="flex-1 min-h-0 overflow-auto rounded-xl border border-slate-200 mb-3">
            <table class="table table-xs table-pin-rows w-full">
                <thead>
                    <tr class="bg-slate-100">
                        <th class="text-[10px] align-bottom min-w-[6rem] max-w-[11rem] p-1">
                            <button
                                type="button"
                                id="calendar-pool-sort-label"
                                class="btn btn-ghost btn-xs h-7 min-h-0 px-1.5 font-bold uppercase tracking-wide text-[9px] text-slate-600 hover:bg-slate-200/80"
                            >
                                Libellé
                            </button>
                        </th>
                        <th class="text-[10px] align-bottom w-[1%] whitespace-nowrap p-1 font-bold uppercase tracking-wide text-slate-600">
                            URL agenda
                        </th>
                        <th class="text-[10px] align-bottom min-w-[7rem] p-1">
                            <button
                                type="button"
                                id="calendar-pool-sort-assignee"
                                class="btn btn-ghost btn-xs h-7 min-h-0 px-1.5 font-bold uppercase tracking-wide text-[9px] text-slate-600 hover:bg-slate-200/80"
                            >
                                Assigné à
                            </button>
                        </th>
                        <th class="text-[10px] align-bottom w-28">Statut</th>
                    </tr>
                </thead>
                <tbody id="calendar-pool-tbody"></tbody>
            </table>
        </div>

        <div class="modal-action shrink-0 mt-0 pt-2 border-t border-slate-100">
            <button type="button" class="btn btn-ghost btn-sm font-normal text-[11px]" onclick="document.getElementById('modal_calendar_pool').close()">Fermer</button>
        </div>
    </div>
</dialog>

<dialog id="modal_calendar_pool_add" class="modal">
    <div class="modal-box p-5 w-[96%] max-w-md rounded-2xl border border-slate-200 shadow-2xl">
        <h3 class="font-black text-xs mb-3 uppercase text-slate-500 border-b pb-2 tracking-widest">Ajouter un calendrier</h3>
        <label class="flex flex-col gap-0 min-w-0 mb-2">
            <span class="text-[9px] font-bold text-slate-600">ID calendrier Google <span class="font-normal text-slate-400">(oblig.)</span></span>
            <input type="text" id="calendar-pool-add-google-id" placeholder="ID ou lien (?src=…)" class="input input-xs input-bordered w-full text-[10px] h-9 min-h-0 font-mono" autocomplete="off" />
        </label>
        <label class="flex flex-col gap-0 min-w-0 mb-4">
            <span class="text-[9px] font-bold text-slate-600">Libellé</span>
            <input type="text" id="calendar-pool-add-label" placeholder="Nom affiché dans l’admin" class="input input-xs input-bordered w-full text-[10px] h-9 min-h-0" autocomplete="off" />
        </label>
        <div class="modal-action mt-0 flex justify-end gap-2 border-t border-slate-100 pt-3">
            <button type="button" id="calendar-pool-add-cancel" class="btn btn-ghost btn-sm font-normal text-[11px]">Annuler</button>
            <button type="button" id="calendar-pool-add-submit" class="btn btn-primary btn-sm font-normal text-[11px]">Ajouter</button>
        </div>
    </div>
</dialog>
