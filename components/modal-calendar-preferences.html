<dialog id="modal_calendar_preferences" class="modal">
    <div class="modal-box p-5 w-[96%] max-w-md max-h-[90dvh] overflow-y-auto rounded-2xl border border-slate-200 shadow-2xl">
        <h3 class="font-black text-xs mb-1 uppercase text-slate-500 border-b pb-2 tracking-widest">Préférences du calendrier</h3>
        <p class="text-[10px] text-slate-600 mb-4 leading-snug">Réglages locaux à ce navigateur. Ils s’appliquent tout de suite au planning.</p>

        <div class="mb-5">
            <p class="text-[10px] font-bold uppercase text-slate-500 tracking-wide mb-2">Thème</p>
            <div class="cal-pref-theme-row flex gap-3" role="radiogroup" aria-label="Thème d’affichage">
                <button
                    type="button"
                    id="cal-pref-theme-light"
                    class="cal-pref-theme-tile cal-pref-theme-tile--light flex-1 min-h-[4.25rem] rounded-xl border-2 border-slate-200 bg-white shadow-sm transition outline-offset-2 hover:border-slate-300"
                    aria-pressed="false"
                    aria-label="Thème clair"
                >
                    <span class="block text-[10px] font-bold text-slate-600 text-center">Clair</span>
                    <span class="mt-1 block h-6 rounded-md bg-slate-100 border border-slate-200 mx-1"></span>
                </button>
                <button
                    type="button"
                    id="cal-pref-theme-dark"
                    class="cal-pref-theme-tile cal-pref-theme-tile--dark flex-1 min-h-[4.25rem] rounded-xl border-2 border-slate-600 bg-slate-800 shadow-sm transition outline-offset-2 hover:border-slate-500"
                    aria-pressed="false"
                    aria-label="Thème sombre"
                >
                    <span class="block text-[10px] font-bold text-slate-200 text-center">Sombre</span>
                    <span class="mt-1 block h-6 rounded-md bg-slate-700 border border-slate-600 mx-1"></span>
                </button>
            </div>
        </div>

        <div class="mb-2">
            <p class="text-[10px] font-bold uppercase text-slate-500 tracking-wide mb-1">Taille du texte dans les créneaux</p>
            <p class="text-[9px] text-slate-500 mb-2 leading-snug">Aperçu de la taille appliquée aux horaires et titres sur la grille.</p>
            <div class="cal-pref-scale-previews flex justify-between items-end gap-2 px-0.5 mb-1 select-none" aria-hidden="true">
                <span class="cal-pref-scale-preview cal-pref-scale-preview--0 font-semibold text-slate-700 leading-none">A</span>
                <span class="cal-pref-scale-preview cal-pref-scale-preview--1 font-semibold text-slate-700 leading-none">A</span>
                <span class="cal-pref-scale-preview cal-pref-scale-preview--2 font-semibold text-slate-700 leading-none">A</span>
            </div>
            <div class="cal-pref-range-wrap px-0.5 max-w-[75%] mx-auto">
                <input
                    type="range"
                    id="cal-pref-text-scale"
                    class="cal-pref-text-range w-full"
                    min="0"
                    max="2"
                    step="1"
                    value="1"
                    aria-valuemin="0"
                    aria-valuemax="2"
                    aria-valuenow="1"
                    aria-label="Taille du texte des créneaux sur trois niveaux"
                />
            </div>
        </div>
    </div>
</dialog>
