<dialog id="modal_announcements" class="modal">
    <div class="modal-box p-5 w-[96%] max-w-md max-h-[90dvh] rounded-2xl border border-slate-200 shadow-2xl flex flex-col dark:border-slate-600">
        <p class="text-[10px] text-slate-500 dark:text-slate-400 mb-2 leading-snug shrink-0">
            Ce texte s’affiche sur la <strong>modale de connexion</strong> (bandeau au-dessus du formulaire), uniquement entre la date de début et la date de fin (incluses, journées entières).
        </p>

        <div class="flex flex-wrap items-end gap-3 shrink-0 mb-2">
            <label class="flex flex-col gap-0.5 text-xs text-slate-700 dark:text-slate-200 min-w-[9rem] flex-1">
                <span class="font-semibold">Début</span>
                <input type="date" id="ann-start-date" lang="fr" class="input input-sm input-bordered w-full text-xs font-mono" />
            </label>
            <label class="flex flex-col gap-0.5 text-xs text-slate-700 dark:text-slate-200 min-w-[9rem] flex-1">
                <span class="font-semibold">Fin</span>
                <input type="date" id="ann-end-date" lang="fr" class="input input-sm input-bordered w-full text-xs font-mono" />
            </label>
        </div>

        <div id="ann-quill-mount" class="planning-quill-mount planning-quill-mount--compact planning-quill-mount--announcements min-h-0 flex-1"></div>

        <div class="modal-action shrink-0 mt-3 flex justify-start">
            <button type="button" id="ann-clear-all-btn" class="btn btn-outline btn-sm text-[11px]">Tout effacer</button>
        </div>
    </div>
</dialog>
