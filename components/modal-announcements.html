<dialog id="modal_announcements" class="modal">
    <div class="modal-box p-5 w-[96%] max-w-md max-h-[90dvh] rounded-2xl border border-slate-200 shadow-2xl flex flex-col">
        <h3 class="font-black text-xs mb-2 uppercase text-slate-500 border-b pb-2 tracking-widest shrink-0">Annonce écran de connexion</h3>
        <p class="text-[10px] text-slate-500 mb-3 leading-snug">
            Un seul message à la fois : <strong>publier</strong> remplace toute annonce précédente pour cet écran. Même mise en forme que les règles ; trois boutons <strong>T</strong> (petit / moyen / grand) pour la taille du texte.
        </p>

        <div class="rounded-xl border border-slate-200 bg-slate-50/80 p-3 space-y-2 mb-3 shrink-0">
            <div class="grid grid-cols-2 gap-2">
                <div>
                    <label class="text-[9px] font-bold text-slate-500">Début</label>
                    <input type="datetime-local" id="ann-start" class="input input-sm input-bordered w-full text-xs" />
                </div>
                <div>
                    <label class="text-[9px] font-bold text-slate-500">Fin</label>
                    <input type="datetime-local" id="ann-end" class="input input-sm input-bordered w-full text-xs" />
                </div>
            </div>
            <div id="ann-quill-mount" class="planning-quill-mount planning-quill-mount--compact"></div>
            <button type="button" id="ann-publish-btn" class="btn btn-primary btn-sm w-full font-black text-[11px]">Publier (remplace l’ancienne)</button>
        </div>

        <div class="modal-action shrink-0 mt-2">
            <button type="button" class="btn btn-ghost btn-sm font-black text-[11px]" onclick="document.getElementById('modal_announcements').close()">Fermer</button>
        </div>
    </div>
</dialog>
