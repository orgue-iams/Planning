<dialog id="modal_announcements" class="modal">
    <div class="modal-box p-5 w-[96%] max-w-md max-h-[90dvh] rounded-2xl border border-slate-200 shadow-2xl flex flex-col">
        <h3 class="font-black text-xs mb-2 uppercase text-slate-500 border-b pb-2 tracking-widest shrink-0">Annonce écran de connexion</h3>
        <p class="text-[10px] text-slate-500 mb-3 leading-snug">
            Un seul message à la fois : <strong>publier</strong> remplace toute annonce précédente pour cet écran. Mise en forme : gras, italique, souligné. Laisser le texte vide et publier pour retirer l’annonce de l’écran de connexion.
        </p>

        <div class="rounded-xl border border-slate-200 bg-white p-3 space-y-2 mb-3 shrink-0">
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-2">
                <div class="space-y-1">
                    <span class="text-[9px] font-bold text-slate-500 block">Début</span>
                    <input type="date" id="ann-start-date" lang="fr" class="input input-sm input-bordered w-full text-xs font-mono mb-1" />
                    <input
                        type="text"
                        id="ann-start-time"
                        class="input input-sm input-bordered w-full text-xs font-mono"
                        maxlength="5"
                        placeholder="08:00"
                        title="Heure 24 h"
                        inputmode="numeric"
                        autocomplete="off"
                        spellcheck="false"
                        lang="fr"
                    />
                </div>
                <div class="space-y-1">
                    <span class="text-[9px] font-bold text-slate-500 block">Fin</span>
                    <input type="date" id="ann-end-date" lang="fr" class="input input-sm input-bordered w-full text-xs font-mono mb-1" />
                    <input
                        type="text"
                        id="ann-end-time"
                        class="input input-sm input-bordered w-full text-xs font-mono"
                        maxlength="5"
                        placeholder="08:00"
                        title="Heure 24 h"
                        inputmode="numeric"
                        autocomplete="off"
                        spellcheck="false"
                        lang="fr"
                    />
                </div>
            </div>
            <div id="ann-quill-mount" class="planning-quill-mount planning-quill-mount--compact"></div>
        </div>

        <div class="modal-action shrink-0 mt-2 flex gap-2 justify-end">
            <button type="button" id="ann-publish-btn" class="btn btn-primary btn-sm font-black text-[11px]">Publier (remplace l’ancienne)</button>
            <button type="button" class="btn btn-ghost btn-sm font-black text-[11px]" onclick="document.getElementById('modal_announcements').close()">Fermer</button>
        </div>
    </div>
</dialog>
