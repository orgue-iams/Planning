<dialog id="modal_announcements" class="modal">
    <div class="modal-box p-5 w-[96%] max-w-md max-h-[90dvh] rounded-2xl border border-slate-200 shadow-2xl flex flex-col dark:border-slate-600">
        <div class="flex flex-col gap-2 shrink-0 mb-2">
            <label class="flex flex-wrap items-center gap-2 text-xs text-slate-700 dark:text-slate-200">
                <span class="font-semibold shrink-0 w-[3.25rem]">Début</span>
                <input type="date" id="ann-start-date" lang="fr" class="input input-sm input-bordered flex-1 min-w-[8rem] text-xs font-mono" />
            </label>
            <label class="flex flex-wrap items-center gap-2 text-xs text-slate-700 dark:text-slate-200">
                <span class="font-semibold shrink-0 w-[3.25rem]">Fin</span>
                <input type="date" id="ann-end-date" lang="fr" class="input input-sm input-bordered flex-1 min-w-[8rem] text-xs font-mono" />
            </label>
        </div>

        <div id="ann-quill-mount" class="planning-quill-mount planning-quill-mount--compact planning-quill-mount--announcements min-h-0 flex-1"></div>
        <button type="button" id="ann-clear-all-btn" class="planning-quill-clear-all btn btn-sm text-[11px] hidden" aria-hidden="true">Tout effacer</button>
    </div>
</dialog>
