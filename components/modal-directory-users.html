<dialog id="modal_directory_users" class="modal">
    <div class="modal-box p-4 w-[96%] max-w-lg max-h-[90dvh] overflow-y-auto rounded-2xl border border-slate-200 shadow-2xl min-w-0 dark:border-slate-600">
        <div id="directory-users-list-panel" class="min-w-0">
            <div id="directory-users-status" class="text-[11px] text-slate-500 dark:text-slate-400 mb-2 min-h-[1rem]"></div>
            <div id="directory-readonly-unified" class="mb-0 min-w-0 hidden"></div>
            <div id="directory-admin-users-wrap" class="mb-0 min-w-0 hidden" aria-hidden="true">
                <div id="directory-admin-users-table"></div>
            </div>
            <div id="directory-section-admins" class="hidden" aria-hidden="true"></div>
            <div id="directory-section-profs" class="hidden" aria-hidden="true"></div>
            <div id="directory-section-eleves" class="hidden" aria-hidden="true"></div>
            <div id="directory-add-user-wrap" class="hidden mt-4 pt-3 border-t border-slate-200 dark:border-slate-600">
                <div class="flex flex-wrap items-center gap-2">
                    <button type="button" id="directory-add-user-btn" class="btn btn-primary btn-sm btn-square shrink-0" title="Ajouter un utilisateur" aria-label="Ajouter un utilisateur">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M12 5v14m-7-7h14"/></svg>
                    </button>
                    <span class="text-sm font-medium text-slate-700 dark:text-slate-200">Ajouter un utilisateur</span>
                </div>
            </div>
        </div>

        <div id="directory-user-edit-panel" class="hidden min-w-0 space-y-3" aria-hidden="true">
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                <label class="flex flex-col gap-1 min-w-0">
                    <span class="text-xs font-semibold text-slate-600 dark:text-slate-300">Nom</span>
                    <input type="text" id="directory-edit-nom" class="input input-bordered input-sm w-full bg-white dark:bg-slate-900 dark:text-slate-100 dark:border-slate-600" autocomplete="family-name" />
                </label>
                <label class="flex flex-col gap-1 min-w-0">
                    <span class="text-xs font-semibold text-slate-600 dark:text-slate-300">Prénom</span>
                    <input type="text" id="directory-edit-prenom" class="input input-bordered input-sm w-full bg-white dark:bg-slate-900 dark:text-slate-100 dark:border-slate-600" autocomplete="given-name" />
                </label>
                <label class="flex flex-col gap-1 min-w-0 sm:col-span-2">
                    <span class="text-xs font-semibold text-slate-600 dark:text-slate-300">E-mail</span>
                    <input type="email" id="directory-edit-email" class="input input-bordered input-sm w-full bg-white dark:bg-slate-900 dark:text-slate-100 dark:border-slate-600" autocomplete="email" />
                </label>
                <label class="flex flex-col gap-1 min-w-0 sm:col-span-2">
                    <span class="text-xs font-semibold text-slate-600 dark:text-slate-300">Téléphone</span>
                    <input type="tel" id="directory-edit-phone" class="input input-bordered input-sm w-full bg-white dark:bg-slate-900 dark:text-slate-100 dark:border-slate-600" maxlength="40" autocomplete="tel" />
                </label>
                <label id="directory-edit-role-wrap" class="flex flex-col gap-1 min-w-0 hidden sm:col-span-2">
                    <span class="text-xs font-semibold text-slate-600 dark:text-slate-300">Rôle</span>
                    <select id="directory-edit-role" class="select select-bordered select-sm w-max max-w-full dark:bg-slate-900 dark:text-slate-100 dark:border-slate-600">
                        <option value="admin">Admin</option>
                        <option value="prof">Prof</option>
                        <option value="eleve">Élève</option>
                    </select>
                </label>
                <label id="directory-edit-password-wrap" class="flex flex-col gap-1 min-w-0 hidden sm:col-span-2">
                    <span class="text-xs font-semibold text-slate-600 dark:text-slate-300">Nouveau mot de passe <span class="font-normal text-slate-500">(facultatif)</span></span>
                    <input type="password" id="directory-edit-password" class="input input-bordered input-sm w-full bg-white dark:bg-slate-900 dark:text-slate-100 dark:border-slate-600" autocomplete="new-password" />
                </label>
            </div>
            <p id="directory-edit-agenda-readonly" class="text-sm text-slate-700 dark:text-slate-200 m-0 break-words"></p>
            <p id="directory-edit-save-hint" class="text-[11px] text-slate-500 dark:text-slate-400 m-0">Les modifications sont enregistrées à la sortie de chaque champ.</p>
        </div>
    </div>
</dialog>
