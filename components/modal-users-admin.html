<dialog id="modal_users_admin" class="modal" tabindex="-1">
    <div class="modal-box p-5 w-[96%] max-w-xl max-h-[90dvh] rounded-2xl border border-slate-200 dark:border-slate-600 shadow-2xl flex flex-col bg-white dark:bg-slate-800">
        <h2 id="admin-user-modal-title" class="planning-modal-title text-base sm:text-lg font-bold tracking-tight text-slate-900 dark:text-slate-100 mb-3 shrink-0 m-0">Nouvel utilisateur</h2>

        <div class="planning-route-section planning-route-section--first shrink-0 flex-1 min-h-0 overflow-y-auto space-y-3">
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 gap-y-2">
                <label class="flex flex-col gap-1 min-w-0">
                    <span class="text-xs sm:text-sm font-semibold text-slate-600 dark:text-slate-300 leading-tight">Nom <span class="font-normal text-slate-500 dark:text-slate-400">(oblig.)</span></span>
                    <input type="text" id="admin-invite-nom" placeholder="Nom de famille" class="input input-bordered input-sm w-full text-sm min-h-[2.75rem] sm:min-h-0 bg-white text-slate-900 border-slate-300 dark:bg-slate-900 dark:text-slate-100 dark:border-slate-600" required autocomplete="family-name" />
                </label>
                <label class="flex flex-col gap-1 min-w-0">
                    <span class="text-xs sm:text-sm font-semibold text-slate-600 dark:text-slate-300 leading-tight">Prénom <span class="font-normal text-slate-500 dark:text-slate-400">(oblig.)</span></span>
                    <input type="text" id="admin-invite-prenom" placeholder="Prénom" class="input input-bordered input-sm w-full text-sm min-h-[2.75rem] sm:min-h-0 bg-white text-slate-900 border-slate-300 dark:bg-slate-900 dark:text-slate-100 dark:border-slate-600" required autocomplete="given-name" />
                </label>
                <label class="flex flex-col gap-1 min-w-0 sm:col-span-2">
                    <span class="text-xs sm:text-sm font-semibold text-slate-600 dark:text-slate-300 leading-tight">E-mail <span class="font-normal text-slate-500 dark:text-slate-400">(oblig.)</span></span>
                    <input type="email" id="admin-invite-email" placeholder="eleve@…" class="input input-bordered input-sm w-full text-sm min-h-[2.75rem] sm:min-h-0 bg-white text-slate-900 border-slate-300 dark:bg-slate-900 dark:text-slate-100 dark:border-slate-600" required autocomplete="email" />
                </label>
                <label class="flex flex-col gap-1 min-w-0 sm:col-span-2">
                    <span class="text-xs sm:text-sm font-semibold text-slate-600 dark:text-slate-300 leading-tight">Téléphone <span class="font-normal text-slate-500 dark:text-slate-400">(facult.)</span></span>
                    <input type="tel" id="admin-invite-phone" placeholder="06 12 34 56 78" class="input input-bordered input-sm w-full text-sm min-h-[2.75rem] sm:min-h-0 bg-white text-slate-900 border-slate-300 dark:bg-slate-900 dark:text-slate-100 dark:border-slate-600" maxlength="40" autocomplete="tel" />
                </label>
            </div>

            <div id="admin-user-create-mode-wrap" class="hidden mt-1 space-y-2 rounded-xl border border-slate-200 bg-slate-50/90 p-3 dark:border-slate-600 dark:bg-slate-900/50">
                <label class="flex items-start gap-2.5 cursor-pointer text-sm sm:text-[0.9375rem] font-medium text-slate-800 dark:text-slate-100 leading-snug">
                    <input type="radio" name="admin-user-create-mode" value="invite" class="radio radio-sm radio-primary shrink-0 mt-0.5" checked />
                    Inviter par e-mail (sans définir de mot de passe)
                </label>
                <label class="flex items-start gap-2.5 cursor-pointer text-sm sm:text-[0.9375rem] font-medium text-slate-800 dark:text-slate-100 leading-snug">
                    <input type="radio" name="admin-user-create-mode" value="create" class="radio radio-sm radio-primary shrink-0 mt-0.5" />
                    Créer le compte tout de suite (mot de passe requis)
                </label>
            </div>

            <div class="mt-1">
                <label class="flex flex-col gap-1 w-max max-w-full">
                    <span class="text-xs sm:text-sm font-semibold text-slate-600 dark:text-slate-300 leading-tight">Rôle</span>
                    <select id="admin-invite-role" class="select select-bordered select-sm w-max max-w-full text-sm min-h-[2.75rem] sm:min-h-8 bg-white text-slate-900 border-slate-300 dark:bg-slate-900 dark:text-slate-100 dark:border-slate-600" aria-label="Rôle du compte">
                        <option value="admin">Admin</option>
                        <option value="prof">Prof</option>
                        <option value="eleve" selected>Élève</option>
                    </select>
                </label>
            </div>

            <div class="mt-2 space-y-1.5">
                <span id="admin-password-label" class="text-xs font-bold uppercase tracking-wide text-slate-600 dark:text-slate-300 block">Mot de passe</span>
                <div class="planning-pass-field relative z-[1] w-full overflow-visible">
                    <input type="password" id="admin-create-password" autocomplete="new-password" placeholder="" class="input input-sm input-bordered w-full text-sm min-h-[2.75rem] sm:h-10 pr-[3.25rem] admin-create-password-input bg-slate-50 text-slate-900 border-slate-300 dark:bg-slate-900 dark:text-slate-100 dark:border-slate-600" />
                    <button type="button" id="admin-create-pw-toggle" class="planning-pass-toggle" aria-label="Afficher le mot de passe" aria-pressed="false">
                        <span id="admin-create-pw-icon-show" class="planning-pass-toggle__icon" aria-hidden="true">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" width="20" height="20">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
                                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            </svg>
                        </span>
                        <span id="admin-create-pw-icon-hide" class="planning-pass-toggle__icon hidden" aria-hidden="true">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" width="20" height="20">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.274M6.228 6.228L3 3m3.228 3.228L12 12m-5.772-5.772L9.88 9.88M18.228 18.228L21 21m-2.772-2.772L12 12" />
                            </svg>
                        </span>
                    </button>
                </div>
                <span id="admin-password-field-hint" class="hidden text-xs text-slate-600 dark:text-slate-300 leading-snug"></span>
            </div>
            <ul id="admin-create-pw-policy" class="text-xs sm:text-sm text-slate-600 dark:text-slate-300 list-disc list-inside mt-1.5 mb-1 pl-0.5 space-y-0.5 sm:columns-2 sm:gap-x-6"></ul>
        </div>

        <div class="modal-action mt-2 border-t border-slate-200 dark:border-slate-600 pt-3 shrink-0 flex flex-wrap justify-end gap-2">
            <button type="button" id="admin-user-modal-cancel" class="btn btn-ghost btn-sm font-normal text-sm">Fermer</button>
            <button type="button" id="admin-user-modal-save" class="btn btn-primary btn-sm font-normal text-sm">Enregistrer</button>
        </div>
    </div>
</dialog>

<dialog id="modal_admin_password" class="modal" tabindex="-1">
    <div class="modal-box w-[96%] max-w-lg border border-slate-200 dark:border-slate-600 p-5 rounded-2xl bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100">
        <h3 class="font-bold text-sm uppercase tracking-wide text-slate-600 dark:text-slate-300 mb-2">Nouveau mot de passe</h3>
        <p class="text-sm text-slate-600 dark:text-slate-300 mb-3 break-all font-mono" id="admin-pw-target-email"></p>
        <input type="hidden" id="admin-pw-user-id" value="" />
        <label class="sr-only" for="admin-pw-new">Nouveau mot de passe</label>
        <div class="planning-pass-field relative z-[1] w-full mb-3 overflow-visible">
            <input type="password" id="admin-pw-new" autocomplete="new-password" placeholder="Nouveau mot de passe" class="input input-bordered w-full text-sm h-12 min-h-0 pr-[3.25rem] bg-slate-50 text-slate-900 border-slate-300 dark:bg-slate-900 dark:text-slate-100 dark:border-slate-600" />
            <button type="button" class="planning-pass-toggle" data-admin-pw-toggle="admin-pw-new" aria-label="Afficher le mot de passe" aria-pressed="false">

                        <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />

                    </svg>
                </span>

                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" width="22" height="22">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.274M6.228 6.228L3 3m3.228 3.228L12 12m-5.772-5.772L9.88 9.88M18.228 18.228L21 21m-2.772-2.772L12 12" />
                    </svg>
                </span>
            </button>
        </div>
        <label class="sr-only" for="admin-pw-new2">Confirmer le mot de passe</label>
        <div class="planning-pass-field relative z-[1] w-full mb-3 overflow-visible">
            <input type="password" id="admin-pw-new2" autocomplete="new-password" placeholder="Confirmer" class="input input-bordered w-full text-sm h-12 min-h-0 pr-[3.25rem] bg-slate-50 text-slate-900 border-slate-300 dark:bg-slate-900 dark:text-slate-100 dark:border-slate-600" />
            <button type="button" class="planning-pass-toggle" data-admin-pw-toggle="admin-pw-new2" aria-label="Afficher le mot de passe" aria-pressed="false">
                <span class="planning-pass-toggle__icon planning-pass-toggle__show" aria-hidden="true">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" width="22" height="22">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                    </svg>
                </span>
                <span class="planning-pass-toggle__icon planning-pass-toggle__hide hidden" aria-hidden="true">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" width="22" height="22">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.274M6.228 6.228L3 3m3.228 3.228L12 12m-5.772-5.772L9.88 9.88M18.228 18.228L21 21m-2.772-2.772L12 12" />
                    </svg>
                </span>
            </button>
        </div>
        <p class="text-xs font-bold uppercase tracking-wide text-slate-600 dark:text-slate-300 mt-2 mb-1">Politique à respecter</p>
        <ul id="admin-pw-policy" class="text-xs sm:text-sm text-slate-700 dark:text-slate-300 list-disc list-inside mb-3 space-y-1"></ul>
        <div class="flex justify-end gap-2">
            <button type="button" class="btn btn-ghost btn-sm font-normal text-sm" onclick="document.getElementById('modal_admin_password').close()">Fermer</button>
            <button type="button" id="admin-pw-save" class="btn btn-primary btn-sm font-normal text-sm">Enregistrer</button>
        </div>
    </div>
</dialog>

<dialog id="modal_admin_confirm" class="modal" tabindex="-1">
    <div class="modal-box w-[96%] max-w-md border border-slate-200 dark:border-slate-600 p-5 rounded-2xl bg-white dark:bg-slate-800">
        <h3 class="font-bold text-sm uppercase tracking-wide text-slate-600 dark:text-slate-300 mb-2">Confirmation</h3>
        <p class="text-sm text-slate-800 dark:text-slate-200 mb-4" id="admin-confirm-message"></p>
        <div class="flex justify-end gap-2">
            <button type="button" id="admin-confirm-cancel" class="btn btn-ghost btn-sm font-normal text-sm">Annuler</button>
            <button type="button" id="admin-confirm-ok" class="btn btn-primary btn-sm font-normal text-sm">Confirmer</button>
        </div>
    </div>
</dialog>
