<dialog id="modal_login" class="modal">
    <div class="modal-box max-w-sm border border-slate-200 shadow-2xl p-8">
        <div class="text-center mb-8">
            <div class="text-5xl mb-2">🎹</div>
            <h2 class="font-black text-2xl uppercase tracking-tighter text-slate-800">Orgue Gérard Bancells</h2>
            <p class="text-xs text-slate-500 font-bold uppercase tracking-[0.15em] mt-1">Espace de réservation</p>
            <div id="login-banner-box" class="hidden mt-3 rounded-xl border border-amber-200/80 bg-amber-50/90 px-3 py-2 text-left text-xs text-slate-800 leading-snug"></div>
            <p id="login-demo-hint" class="text-[10px] text-slate-400 mt-3 leading-relaxed text-left px-1">Démo : <span class="font-mono">admin@iams.fr</span> / <span class="font-mono">prof@iams.fr</span> / <span class="font-mono">eleve1@iams.fr</span> / <span class="font-mono">eleve2@iams.fr</span> / <span class="font-mono">consultation@iams.fr</span> — mot de passe <span class="font-mono">1234</span></p>
        </div>
        
        <div class="space-y-4">
            <div class="form-control">
                <label class="sr-only" for="login-email">Adresse e-mail</label>
                <input type="email" id="login-email" name="email" autocomplete="username" placeholder="votre@email.com" class="input input-bordered w-full h-12 bg-slate-50 text-sm" required />
            </div>
            <div class="form-control">
                <label class="sr-only" for="login-pass">Mot de passe</label>
                <div class="login-pass-field relative w-full">
                    <input type="password" id="login-pass" name="password" autocomplete="current-password" placeholder="Mot de passe" class="input input-bordered w-full h-12 bg-slate-50 text-sm pr-14" required />
                    <button type="button" id="login-pass-toggle" class="login-pass-toggle" aria-label="Afficher le mot de passe" aria-pressed="false">
                        <span id="login-pass-icon-show" class="login-pass-toggle__icon" aria-hidden="true">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" width="22" height="22">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
                                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            </svg>
                        </span>
                        <span id="login-pass-icon-hide" class="login-pass-toggle__icon hidden" aria-hidden="true">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" width="22" height="22">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.274M6.228 6.228L3 3m3.228 3.228L12 12m-5.772-5.772L9.88 9.88M18.228 18.228L21 21m-2.772-2.772L12 12" />
                            </svg>
                        </span>
                    </button>
                </div>
                <label class="label justify-end">
                    <button type="button" onclick="window.openForgotPassword()" class="label-text-alt link link-primary font-bold text-xs uppercase">Mot de passe oublié ?</button>
                </label>
            </div>
            <button type="button" id="btn-do-login" class="btn btn-primary w-full text-white font-black h-12 shadow-xl shadow-primary/30">SE CONNECTER</button>
        </div>
    </div>
</dialog>
