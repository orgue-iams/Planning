<dialog id="modal_login" class="modal modal-login-shell" tabindex="-1">
    <div class="modal-box modal-login-box max-w-sm w-[92%] sm:w-full p-6 sm:p-8 rounded-2xl shadow-2xl">
        <div class="login-card__header text-center mb-7">
            <h2 class="login-card__title font-black text-xl sm:text-2xl uppercase tracking-tight">Orgue Gérard Bancells</h2>
            <p class="login-card__subtitle text-xs font-semibold mt-1.5 leading-snug">IAMS - Institut Catholique de Toulouse</p>
            <p id="login-version-badge" class="login-card__version text-[10px] font-mono mt-2" title=""></p>
            <div id="login-banner-box" class="login-card__banner hidden mt-3 rounded-xl border px-3 py-2 text-left text-xs leading-snug"></div>
        </div>

        <div class="login-card__form space-y-4">
            <div class="form-control">
                <label class="sr-only" for="login-email">Adresse e-mail</label>
                <input type="email" id="login-email" name="email" autocomplete="username" placeholder="votre@email.com" class="input input-bordered login-field w-full h-12 text-base" required />
            </div>
            <div class="form-control login-pass-form-control overflow-visible">
                <label class="sr-only" for="login-pass">Mot de passe</label>
                <div class="login-pass-field relative z-[1] w-full">
                    <input type="password" id="login-pass" name="password" autocomplete="current-password" placeholder="Mot de passe" class="input input-bordered login-field w-full h-12 text-base pr-[3.25rem]" required />
                    <button type="button" id="login-pass-toggle" class="login-pass-toggle" aria-label="Afficher le mot de passe" aria-pressed="false">
                        <span id="login-pass-icon-show" class="login-pass-toggle__icon" aria-hidden="true">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" width="22" height="22">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
                                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            </svg>
                        </span>
                        <span id="login-pass-icon-hide" class="login-pass-toggle__icon hidden" aria-hidden="true">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" width="22" height="22">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.274M6.228 6.228L3 3m3.228 3.228L12 12m-5.772-5.772L9.88 9.88M18.228 18.228L21 21m-2.772-2.772L12 12" />
                            </svg>
                        </span>
                    </button>
                </div>
                <label class="label justify-end py-1 min-h-0">
                    <button type="button" onclick="window.openForgotPassword()" class="login-card__forgot link link-primary text-xs font-bold uppercase">Mot de passe oublié ?</button>
                </label>
            </div>
            <label class="login-remember flex cursor-pointer items-center gap-2.5 px-0.5 py-1 text-left">
                <input type="checkbox" id="login-remember-me" name="remember" class="checkbox checkbox-primary checkbox-sm login-remember__checkbox" checked />
                <span class="login-remember__label text-sm leading-snug">Se souvenir de moi sur cet appareil</span>
            </label>
            <button type="button" id="btn-do-login" class="btn btn-primary w-full text-white font-bold h-12 text-sm tracking-wide shadow-lg">SE CONNECTER</button>
        </div>
    </div>
</dialog>
