<dialog id="modal_password" class="modal">
    <div class="modal-box max-w-sm border border-slate-200 p-6 rounded-2xl shadow-2xl">
        <div class="text-center mb-4">
            <div class="text-3xl mb-1">🔐</div>
            <h3 class="font-black text-xs uppercase tracking-widest text-slate-400">Sécurité du compte</h3>
        </div>

        <div class="rounded-xl border border-slate-200 bg-slate-50/90 p-3 mb-4 text-left">
            <p class="text-[10px] font-black uppercase text-slate-500 tracking-wide mb-1.5">Politique du mot de passe</p>
            <ul id="password-policy-lines" class="text-[11px] text-slate-600 leading-snug list-disc list-inside space-y-1 marker:text-slate-400"></ul>
        </div>

        <div class="space-y-4">
            <div id="group-old-pass" class="form-control">
                <label class="label py-0"><span class="label-text font-bold text-[11px] uppercase text-slate-500">Ancien mot de passe</span></label>
                <input type="password" id="old-pass" placeholder="••••••••" autocomplete="current-password" class="input input-bordered input-sm w-full font-bold h-11 bg-slate-50" />
            </div>

            <div class="divider my-0 text-[10px] font-black text-slate-300 uppercase tracking-[0.25em]">Nouveau</div>

            <div class="form-control">
                <label class="label py-0"><span class="label-text font-bold text-[11px] uppercase text-slate-500">Nouveau mot de passe</span></label>
                <input type="password" id="new-pass" name="new-password" autocomplete="new-password" class="input input-bordered input-sm w-full font-bold h-11 bg-slate-50" />
            </div>

            <div class="form-control">
                <label class="label py-0"><span class="label-text font-bold text-[11px] uppercase text-slate-500">Confirmer le nouveau</span></label>
                <input type="password" id="confirm-pass" autocomplete="new-password" class="input input-bordered input-sm w-full font-bold h-11 bg-slate-50" />
            </div>

            <label class="label cursor-pointer justify-start gap-2 py-0 min-h-0">
                <input type="checkbox" id="pw-toggle-visible" class="checkbox checkbox-sm checkbox-primary shrink-0" />
                <span class="label-text text-[11px] font-bold text-slate-600 leading-snug text-left">Afficher les mots de passe en clair</span>
            </label>
        </div>

        <div class="modal-action flex justify-between items-center mt-8">
            <button type="button" class="btn btn-ghost btn-sm font-black text-[11px] px-3" onclick="document.getElementById('modal_password').close()">ANNULER</button>
            <button type="button" id="btn-save-pass" class="btn btn-primary btn-sm px-6 font-black text-[11px] shadow-lg shadow-primary/20 uppercase">
                Mettre à jour
            </button>
        </div>
    </div>
</dialog>
