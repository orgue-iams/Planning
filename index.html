<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planning Orgue IAMS</title>
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/locales/fr.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="loader" class="loader-overlay" style="display: none;">
        <div class="spinner"></div>
    </div>

    <div id="loginSection" class="container">
        <h1>Connexion Planning</h1>
        <input type="email" id="userEmail" placeholder="Email">
        <input type="password" id="userPass" placeholder="Mot de passe">
        <button onclick="login()">Se connecter</button>
        <p id="loginMessage" style="color:red;"></p>
    </div>

    <div id="appSection" style="display:none;">
        <div class="header-bar">
            <h2>Planning Orgue</h2>
            <button class="logout-btn" onclick="logout()">Déconnexion</button>
        </div>
        <div id="calendar"></div>
    </div>

    <div id="popupDetails" class="modal" style="display:none;">
        <div class="modal-content">
            <div id="viewMode"></div>
            <div class="modal-buttons">
                <button id="btnDelete" class="delete-btn" onclick="deleteCurrentEvent()">Supprimer</button>
                <button onclick="document.getElementById('popupDetails').style.display='none'">Fermer</button>
            </div>
        </div>
    </div>

    <script src="app.js" defer></script>
</body>
</html>
