<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion Orgue - G. Bancells</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
</head>
<body>

    <div id="loader" style="display:none;">
        <div class="spinner"></div>
    </div>

    <section id="loginSection" class="auth-container">
        <div class="auth-box">
            <h1>Orgue G. Bancells</h1>
            <p class="subtitle">Espace de réservation</p>
            
            <div class="input-group">
                <i class="fa fa-envelope"></i>
                <input type="email" id="userEmail" placeholder="Email" required>
            </div>
            
            <div class="input-group">
                <i class="fa fa-lock"></i>
                <input type="password" id="userPass" placeholder="Mot de passe" required>
                <i class="fa fa-eye toggle-pass" id="togglePassword" onclick="togglePasswordVisibility()"></i>
            </div>

            <button onclick="login()" class="btn-login">Se connecter</button>
            <p id="loginMessage"></p>
            
            <div class="version-display">v1.5.2-stable</div>
        </div>
    </section>

    <section id="appSection" style="display:none;">
        <nav class="navbar">
            <span class="logo">Planning Orgue</span>
            <div class="user-info">
                <span id="userNameDisplay">Utilisateur</span>
                <button onclick="logout()" class="btn-logout"><i class="fa fa-sign-out-alt"></i></button>
            </div>
        </nav>

        <main class="calendar-container">
            <div id="calendar"></div>
        </main>
    </section>

    <script src="auth.js"></script>
    <script src="app.js"></script>
</body>
</html>
