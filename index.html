<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Planning Orgue IAMS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootswatch@5.2.3/dist/sandstone/bootstrap.min.css">
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <div id="loginSection" class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-4 card shadow-sm p-4 border-0">
                <h2 class="text-center h4 mb-4 text-primary">Planning Orgue IAMS</h2>
                <input type="email" id="userEmail" class="form-control mb-2" placeholder="Email">
                <div class="input-group mb-3">
                    <input type="password" id="userPass" class="form-control" placeholder="Mot de passe">
                    <button class="btn btn-outline-secondary" type="button" onclick="togglePass()">👁️</button>
                </div>
                <button id="btnLogin" class="btn btn-primary w-100" onclick="login()">Se connecter</button>
                <div id="loginMessage" class="mt-2 text-center small text-danger"></div>
            </div>
        </div>
    </div>

    <div id="appSection" style="display:none;">
        <nav class="navbar navbar-dark bg-primary mb-3 shadow-sm">
            <div class="container-fluid">
                <span class="navbar-brand mb-0 h1" style="font-weight: 400;">Planning Orgue</span>
                <button class="btn btn-outline-light btn-sm" onclick="logout()">Quitter</button>
            </div>
        </nav>
        <div class="container-fluid">
            <div id="calendar" class="bg-white p-3 rounded shadow-sm border"></div>
        </div>
    </div>

    <div id="popupDetails" class="modal-custom">
        <div class="modal-card border-0 shadow">
            <div class="modal-action-bar">
                <div class="action-left">
                    <button id="btnEdit" class="btn-icon" onclick="switchToEditMode()" title="Modifier">
                        <svg viewBox="0 0 24 24" width="18"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z" fill="#5f6368"/></svg>
                    </button>
                    <button id="btnDelete" class="btn-icon" onclick="deleteCurrentEvent()" title="Supprimer">
                        <svg viewBox="0 0 24 24" width="18"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z" fill="#d9534f"/></svg>
                    </button>
                </div>
                <button class="btn-icon" onclick="closeModals()" title="Fermer">
                    <svg viewBox="0 0 24 24" width="18"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z" fill="#5f6368"/></svg>
                </button>
            </div>
            
            <div id="viewMode" class="modal-body text-dark">
                </div>

            <div id="editMode" class="modal-body" style="display:none;">
                <div class="mb-2"><label class="small text-muted">NOM</label><input type="text" id="editTitle" class="form-control form-control-sm"></div>
                <div class="mb-2"><label class="small text-muted">DATE</label><input type="date" id="editDate" class="form-control form-control-sm"></div>
                <div class="row g-2 mb-3">
                    <div class="col"><label class="small text-muted">DÉBUT</label><input type="time" id="editStart" class="form-control form-control-sm" step="900"></div>
                    <div class="col"><label class="small text-muted">FIN</label><input type="time" id="editEnd" class="form-control form-control-sm" step="900"></div>
                </div>
                <button onclick="saveChanges()" class="btn btn-success btn-sm w-100">Enregistrer</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/locales/fr.js"></script>
    <script src="app.js" defer></script>
</body>
</html>
