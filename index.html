<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Orgue App">
  <link rel="apple-touch-icon" href="https://img.icons8.com/color/512/piano.png">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#2c3e50">

  <title>Planning Orgue</title>

  <style>
    /* Bloque tout mouvement de la page parente pour éviter les barres d'adresse */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #2c3e50; /* Couleur de fond pendant le chargement */
      position: fixed; 
    }

    /* L'iframe occupe tout l'espace, y compris sous l'encoche (Notch) */
    iframe {
      border: none;
      width: 100%;
      height: 100%;
      display: block;
      padding: 0;
      margin: 0;
    }

    /* Optionnel : petit indicateur de chargement discret */
    #loader {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-family: sans-serif;
      font-size: 14px;
      z-index: -1;
    }
  </style>
</head>
<body>

  <div id="loader">Chargement du planning...</div>

  <iframe 
    src="https://script.google.com/macros/s/AKfycbw8XcEYHIm9GYeKTw4mXRg5AxYSa_gz11OVUJYbcLquDNKdO3Ox4Agze_acIgi9vlO-/exec"
    allow="geolocation; microphone; camera; clipboard-write;"
    loading="lazy">
  </iframe>

  <script>
    /* Empêche le rebond (overscroll) sur iOS qui fait apparaître la barre d'adresse */
    document.addEventListener('touchmove', function (e) {
      if (e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') {
        e.preventDefault();
      }
    }, { passive: false });
  </script>
</body>
</html>
