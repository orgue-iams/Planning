<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planning IAMS - Orgue G. Bancells</title>
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/locales/fr.js"></script>
</head>
<body>
    <div id="loader" class="loader-overlay" style="display: none;"><div class="spinner"></div></div>

    <div id="loginSection" class="container login-card">
        <div class="login-header">
            <h1>Planning IAMS</h1>
            <h3>Orgue G. Bancells</h3>
        </div>
        <div class="form-group">
            <div class="input-block">
                <label>Email</label>
                <input type="email" id="userEmail" placeholder="votre@email.com">
            </div>
            <div class="input-block">
                <label>Mot de passe</label>
                <div class="password-wrapper">
                    <input type="password" id="userPass" placeholder="••••••••">
                    <i class="far fa-eye" id="togglePassword" onclick="togglePasswordVisibility()"></i>
                </div>
            </div>
            <button class="login-btn" onclick="login()">Se connecter</button>
            <div class="forgot-link-container">
                <a href="#" onclick="handleForgotPassword(event)" class="forgot-link">Mot de passe oublié ?</a>
            </div>
            <p id="loginMessage"></p>
        </div>
        <div class="version-display version-tag">Chargement build...</div>
    </div>

    <div id="appSection" style="display:none;">
        <div class="header-bar">
            <h2>Orgue G. Bancells</h2>
            <div class="user-info">
                <span id="userNameDisplay"></span>
                <button class="logout-btn" onclick="logout()">Déconnexion</button>
            </div>
        </div>
        <div id="calendar"></div>
        <div class="version-display version-tag-app"></div>
    </div>

    <div id="popupDetails" class="modal" style="display:none;">
        <div class="modal-content">
            <div id="viewMode"></div>
            <div class="modal-buttons">
                <button id="btnDelete" class="delete-btn" onclick="deleteCurrentEvent()">Supprimer ma réservation</button>
                <button class="close-btn" onclick="document.getElementById('popupDetails').style.display='none'">Fermer</button>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
    <script src="app.js"></script>
</body>
</html>
