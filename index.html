<!DOCTYPE html>
<html lang="fr" data-theme="winter">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Réservation des créneaux — Orgue Gérard Bancells (IAMS)">
    <meta name="theme-color" content="#2c3e50">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Orgue IAMS</title>

    <link rel="manifest" href="manifest.json">

    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.4.19/dist/full.min.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>

    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/calendar-theme.css">
    <link rel="stylesheet" href="css/events.css">
    <link rel="stylesheet" href="css/modal.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body class="bg-slate-50 overflow-hidden auth-pending">

    <div id="app-header"></div>
    
    <main id="app-shell" class="pt-14 px-1 pb-1 h-screen max-w-5xl mx-auto flex flex-col gap-1 min-h-0">
        <div id="planning-legend" class="planning-legend flex flex-wrap items-center gap-x-4 gap-y-1.5 px-3 py-2 bg-white rounded-xl border border-slate-200 text-slate-600 shrink-0" aria-label="Légende des créneaux">
            <span class="text-xs font-bold uppercase tracking-wide text-slate-500 w-full sm:w-auto">Légende</span>
            <span class="legend-item"><span class="legend-swatch legend-swatch--mine" aria-hidden="true"></span>Moi</span>
            <span class="legend-item"><span class="legend-swatch legend-swatch--others" aria-hidden="true"></span>Autres</span>
            <span class="legend-item"><span class="legend-swatch legend-swatch--cours" aria-hidden="true"></span>Cours</span>
            <span class="legend-item"><span class="legend-swatch legend-swatch--fermeture" aria-hidden="true"></span>Fermeture</span>
        </div>
        <div id="calendar" class="bg-white rounded-xl shadow-sm border flex-1 min-h-0 w-full"></div>
    </main>

    <div id="app-modals"></div>

    <script src="js/config/planning.config.js"></script>
    <script type="module" src="js/core/app.js"></script>
</body>
</html>
