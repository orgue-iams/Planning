<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="stylesheet" href="style.css">
  <title>Planning Orgue</title>
</head>
<body>
  <div class="header">🎹 PLANNING ORGUE</div>
  
  <div class="container">
    <div id="loginSection" class="card" style="margin:20px;">
      <h2>Connexion</h2>
      <input type="email" id="userEmail" placeholder="Email">
      <button onclick="login()">Se connecter</button>
    </div>

    <div id="appSection" style="display:none;">
      <div class="calendar-container">
        <iframe id="googleCal" src="https://calendar.google.com/calendar/embed?src=orgue.iams@gmail.com&ctz=Europe%2FParis&mode=WEEK&showTabs=1&showNav=1&showTitle=0&showPrint=0"></iframe>
      </div>

      <div id="modalResa" class="modal">
        <h3>Nouvelle Réservation</h3>
        <input type="datetime-local" id="eventStart">
        <input type="datetime-local" id="eventEnd">
        <button onclick="sendAction('reserve')" id="btnResa">Confirmer</button>
        <button onclick="closeModals()" style="background:#ccc; margin-top:10px;">Annuler</button>
      </div>

      <div id="modalListe" class="modal">
        <h3>Mes Réservations</h3>
        <div id="mesEventsList">Chargement...</div>
        <button onclick="closeModals()" style="background:#ccc; margin-top:20px;">Fermer</button>
      </div>
    </div>
  </div>

  <nav id="navBar" class="tab-bar" style="display:none;">
    <button class="tab-item" onclick="logout()"><span>🚪</span>Sortir</button>
    <button class="tab-item" onclick="showMyEvents()"><span>📅</span>Mes créneaux</button>
    <button class="tab-item" onclick="openModal('modalResa')" style="color:var(--accent); font-weight:bold;"><span>⊕</span>Réserver</button>
  </nav>

  <script src="app.js"></script>
</body>
</html>
