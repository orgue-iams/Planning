<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="https://img.icons8.com/color/512/piano.png">
  <title>Planning Orgue</title>
  
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">🎹 PLANNING ORGUE</div>

<div class="container">
  <div id="loginSection" class="card">
    <h2>Connexion</h2>
    <input type="email" id="userEmail" placeholder="Email">
    <input type="password" id="userPass" placeholder="Mot de passe">
    <button onclick="login()">Se connecter</button>
  </div>

  <div id="appSection" style="display:none;">
    <div class="card">
      <div class="calendar-container">
        <iframe id="googleCal" src="https://calendar.google.com/calendar/embed?src=orgue.iams@gmail.com&ctz=Europe%2FParis&mode=WEEK&showTabs=1&showNav=1&showTitle=0&showPrint=0&showCalendars=0"></iframe>
      </div>
    </div>

    <div class="card">
      <h2>Nouvelle Réservation</h2>
      <label>Début (8h - 22h)</label>
      <input type="datetime-local" id="eventStart">
      <label>Fin (max 23h)</label>
      <input type="datetime-local" id="eventEnd">
      <button onclick="sendReservation()" id="btnResa">Réserver ce créneau</button>
      <div id="status"></div>
    </div>
    <button onclick="logout()" class="btn-secondary">Déconnexion</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
