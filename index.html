<!DOCTYPE html>
<html lang="fr" data-theme="winter">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Réservation des créneaux — Orgue Gérard Bancells (IAMS)">
    <meta name="theme-color" content="#2c3e50">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Planning Orgue — IAMS</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" sizes="any">

    <link rel="manifest" href="manifest.json">

    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.4.19/dist/full.min.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.snow.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.min.js"></script>

    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/calendar-toolbar.css">
    <link rel="stylesheet" href="css/calendar-theme.css">
    <link rel="stylesheet" href="css/events.css">
    <link rel="stylesheet" href="css/modal.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body class="bg-slate-50 overflow-hidden auth-pending">

    <div id="app-header"></div>
    
    <main id="app-shell" class="pt-14 px-1 max-w-5xl mx-auto flex flex-col gap-1 min-h-0">
        <div id="calendar-toolbar" class="calendar-toolbar hidden shrink-0 w-full max-w-full" aria-label="Navigation du calendrier">
            <div class="calendar-toolbar__left">
                <button type="button" id="cal-btn-today" class="cal-tb-pill">Auj.</button>
                <button type="button" id="cal-btn-prev" class="cal-tb-nav" aria-label="Période précédente">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" /></svg>
                </button>
                <button type="button" id="cal-btn-next" class="cal-tb-nav" aria-label="Période suivante">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" /></svg>
                </button>
            </div>
            <div class="calendar-toolbar__title" id="cal-toolbar-title"></div>
            <div class="calendar-toolbar__right">
                <div class="cal-view-dd">
                    <button type="button" id="cal-view-trigger" class="cal-tb-pill cal-tb-pill--view" aria-expanded="false" aria-haspopup="listbox">
                        <span id="cal-view-trigger-label">Semaine</span>
                        <span class="cal-tb-pill__chev" aria-hidden="true">▾</span>
                    </button>
                    <ul id="cal-view-menu" class="cal-view-dd__menu" role="listbox" hidden></ul>
                </div>
            </div>
        </div>
        <div id="calendar" class="bg-white rounded-xl shadow-sm border flex-1 min-h-0 w-full"></div>
        <div id="planning-legend" class="planning-legend flex flex-wrap items-center gap-x-3 gap-y-1.5 px-3 py-2 bg-white rounded-xl border border-slate-200 text-slate-600 shrink-0" aria-label="Légende des créneaux">
            <span class="text-[10px] font-bold uppercase tracking-wide text-slate-500 w-full sm:w-auto">Légende</span>
            <span class="legend-item"><span class="legend-swatch legend-swatch--mine-eleve" aria-hidden="true"></span>Mes créneaux</span>
            <span class="legend-item"><span class="legend-swatch legend-swatch--other-eleve" aria-hidden="true"></span>Autres élèves</span>
            <span class="legend-item"><span class="legend-swatch legend-swatch--prof" aria-hidden="true"></span>Prof / cours</span>
            <span class="legend-item"><span class="legend-swatch legend-swatch--student-block" aria-hidden="true"></span>Élève (vue prof)</span>
            <span class="legend-item"><span class="legend-swatch legend-swatch--staff" aria-hidden="true"></span>Mon créneau (prof.)</span>
            <span class="legend-item"><span class="legend-swatch legend-swatch--cours" aria-hidden="true"></span>Type cours</span>
            <span class="legend-item"><span class="legend-swatch legend-swatch--fermeture" aria-hidden="true"></span>Fermeture</span>
        </div>
    </main>

    <div id="app-modals"></div>

    <script src="js/config/planning.config.js"></script>
    <script type="module" src="js/core/app.js"></script>
</body>
</html>
