<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="https://img.icons8.com/color/512/piano.png">
  <title>Orgue App</title>
  <style>
    body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #2c3e50; }
    iframe { border: none; width: 100%; height: 100%; display: block; }
    /* Message d'aide si Safari bloque */
    #safari-fix { 
      display: none; position: absolute; top: 50%; left: 50%; 
      transform: translate(-50%, -50%); text-align: center; color: white; font-family: sans-serif;
    }
    button { padding: 15px 25px; border-radius: 10px; border: none; background: #27ae60; color: white; font-weight: bold; }
  </style>
</head>
<body>

  <div id="safari-fix">
    <p>L'iPad bloque l'affichage automatique.</p>
    <button onclick="reloadIframe()">Cliquer ici pour lancer l'App</button>
  </div>

  <iframe id="appFrame" src="https://script.google.com/macros/s/AKfycbxbG2yrQeZ1FI0_RMR7ILDgtkN4dyQUt49eNRA4uKNOozLIJtjCmSRf8OnZEKyTlzfA/exec" allow="clipboard-write"></iframe>

  <script>
    function reloadIframe() {
      document.getElementById('appFrame').src = document.getElementById('appFrame').src;
    }

    // Si après 3 secondes rien ne charge, on montre le bouton pour Safari
    setTimeout(function() {
      try {
        var frame = document.getElementById('appFrame');
        if (!frame.contentWindow || frame.contentWindow.length === 0) {
          document.getElementById('safari-fix').style.display = 'block';
        }
      } catch (e) {
        document.getElementById('safari-fix').style.display = 'block';
      }
    }, 3000);
  </script>
</body>
</html>
