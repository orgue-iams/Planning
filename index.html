<div id="modalEdit" class="modal">
    <div class="modal-card">
        <div class="modal-header">
            <span class="icon-calendar"></span>
            <h3>Modifier la réservation</h3>
        </div>
        <div class="modal-body">
            <div class="input-group">
                <label>Activité / Nom</label>
                <input type="text" id="editTitle" placeholder="Ex: Répétition Orgue">
            </div>
            <div class="input-group">
                <label>Date</label>
                <input type="date" id="editDate">
            </div>
            <div class="time-row">
                <div class="input-group">
                    <label>Début</label>
                    <input type="time" id="editStart" step="900">
                </div>
                <div class="input-group">
                    <label>Fin</label>
                    <input type="time" id="editEnd" step="900">
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button onclick="updateEvent()" class="btn-save">Enregistrer</button>
            <button onclick="closeModals()" class="btn-cancel">Annuler</button>
        </div>
    </div>
</div>

<div id="popupView" class="modal">
    <div class="modal-card view-card">
        <div class="modal-header blue-header">
            <span class="icon-info"></span>
            <h3>Détails du créneau</h3>
        </div>
        <div id="viewContent" class="modal-body">
            </div>
        <div class="modal-footer">
            <button onclick="closeModals()" class="btn-cancel">Fermer</button>
        </div>
    </div>
</div>
