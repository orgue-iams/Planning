# Migrations SQL puis Edge Functions sur Supabase (CI).
#
# Secrets du dépôt (Settings → Secrets and variables → Actions) :
#   SUPABASE_ACCESS_TOKEN — https://supabase.com/dashboard/account/tokens
#   SUPABASE_PROJECT_REF  — Project Settings → General (Reference ID)
#   SUPABASE_DB_PASSWORD  — Project Settings → Database → mot de passe Postgres
#     (requis pour `supabase db push` ; sans ce secret, l’étape Link échoue)

name: Deploy Supabase

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'supabase/migrations/**'
      - 'supabase/functions/**'
      - 'supabase/config.toml'
      - '.github/workflows/deploy-supabase-functions.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      # Binaire officiel (évite supabase/setup-cli@v1 qui cible Node 20 et casse avec FORCE_JAVASCRIPT_ACTIONS_TO_NODE24).
      - name: Install Supabase CLI
        run: |
          set -euo pipefail
          curl -fsSL "https://github.com/supabase/cli/releases/latest/download/supabase_linux_amd64.tar.gz" -o /tmp/supabase.tgz
          sudo tar -xzf /tmp/supabase.tgz -C /usr/local/bin supabase
          supabase --version

      - name: Link project
        run: supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}" --password "${{ secrets.SUPABASE_DB_PASSWORD }}"

      - name: Push database migrations
        run: supabase db push

      - name: Deploy all functions
        run: supabase functions deploy --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"
