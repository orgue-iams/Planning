# Migrations SQL puis Edge Functions sur Supabase (CI).
#
# Secrets du dépôt (Settings → Secrets and variables → Actions) :
#   SUPABASE_ACCESS_TOKEN — https://supabase.com/dashboard/account/tokens
#   SUPABASE_PROJECT_REF  — Project Settings → General (Reference ID)
#   SUPABASE_DB_PASSWORD  — Project Settings → Database → mot de passe Postgres
#
# En cas d’échec : ouvrir le run → chaque étape affiche les logs ; déplier celle en rouge
# (Install / Check secrets / Link / db push / functions deploy).

name: Deploy Supabase

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'supabase/migrations/**'
      - 'supabase/functions/**'
      - 'supabase/config.toml'
      - '.github/workflows/deploy-supabase-functions.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v6

      - name: Check required secrets
        run: |
          set -euo pipefail
          missing=
          [ -z "${{ secrets.SUPABASE_ACCESS_TOKEN }}" ] && missing="$missing SUPABASE_ACCESS_TOKEN"
          [ -z "${{ secrets.SUPABASE_PROJECT_REF }}" ] && missing="$missing SUPABASE_PROJECT_REF"
          [ -z "${{ secrets.SUPABASE_DB_PASSWORD }}" ] && missing="$missing SUPABASE_DB_PASSWORD"
          if [ -n "$missing" ]; then
            echo "::error::Secrets GitHub manquants ou vides :$missing"
            exit 1
          fi
          echo "Secrets requis : OK (valeurs masquées)"

      - name: Install Supabase CLI
        run: |
          set -euxo pipefail
          curl -fsSL "https://github.com/supabase/cli/releases/latest/download/supabase_linux_amd64.tar.gz" -o /tmp/supabase.tgz
          tar -tzf /tmp/supabase.tgz | head -20
          sudo tar -xzf /tmp/supabase.tgz -C /usr/local/bin
          chmod +x /usr/local/bin/supabase
          supabase --version

      - name: Link project
        run: |
          set -euxo pipefail
          supabase link \
            --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}" \
            --password "${{ secrets.SUPABASE_DB_PASSWORD }}" \
            --yes

      - name: Push database migrations
        run: |
          set -euxo pipefail
          supabase db push --yes

      - name: Deploy all functions
        run: |
          set -euxo pipefail
          supabase functions deploy --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}" --yes
