name: Supabase Keepalive

on:
  schedule:
    - cron: '17 7 * * *'
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - name: Check required secrets
        run: |
          set -euo pipefail
          missing=
          [ -z "${SUPABASE_ACCESS_TOKEN:-}" ] && missing="$missing SUPABASE_ACCESS_TOKEN"
          [ -z "${SUPABASE_PROJECT_REF:-}" ] && missing="$missing SUPABASE_PROJECT_REF"
          [ -z "${SUPABASE_DB_PASSWORD:-}" ] && missing="$missing SUPABASE_DB_PASSWORD"
          if [ -n "$missing" ]; then
            echo "::error::Missing required secrets:$missing"
            exit 1
          fi
          echo "Required secrets: OK"

      - name: Install Supabase CLI
        run: |
          set -euxo pipefail
          curl -fsSL "https://github.com/supabase/cli/releases/latest/download/supabase_linux_amd64.tar.gz" -o /tmp/supabase.tgz
          sudo tar -xzf /tmp/supabase.tgz -C /usr/local/bin
          chmod +x /usr/local/bin/supabase
          supabase --version

      - name: Link project
        run: |
          set -euxo pipefail
          supabase link \
            --project-ref "$SUPABASE_PROJECT_REF" \
            --password "$SUPABASE_DB_PASSWORD" \
            --yes

      - name: Business keepalive SQL checks
        run: |
          set -euxo pipefail
          supabase db query --linked "select now() as checked_at_utc, count(*)::int as profiles_count from public.profiles;" -o table
          supabase db query --linked "select week_type, count(*)::int as lines_count from public.organ_week_template_line group by week_type order by week_type;" -o table
